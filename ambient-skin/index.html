<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ambient Skin - V1 Demo</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }
    
    h1 {
      color: #fff;
      font-weight: 300;
      letter-spacing: 2px;
    }
    
    .skin-container {
      width: 320px;
      height: 480px;
      border-radius: 16px;
      overflow: hidden;
    }
    
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .btn {
      padding: 10px 20px;
      border: 1px solid #333;
      background: #1a1a24;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 150ms ease;
    }
    
    .btn:hover {
      background: #252532;
      border-color: #555;
    }
    
    .btn.primary {
      background: #4a90d9;
      border-color: #4a90d9;
    }
    
    .btn.primary:hover {
      background: #5a9fe9;
    }
    
    .log {
      width: 100%;
      max-width: 600px;
      height: 150px;
      background: #111118;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 12px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: #888;
      overflow-y: auto;
    }
    
    .log-entry {
      margin-bottom: 4px;
    }
    
    .log-entry .time {
      color: #555;
    }
    
    .log-entry .action {
      color: #4a90d9;
    }
    
    .log-entry .params {
      color: #666;
    }
    
    .state-display {
      display: flex;
      gap: 20px;
      color: #666;
      font-size: 12px;
    }
    
    .state-display .value {
      color: #888;
    }
  </style>
</head>
<body>
  <h1>Ambient Skin V1</h1>
  
  <div id="skin-container" class="skin-container"></div>
  
  <div class="controls">
    <button class="btn" onclick="window.skin?.cycleMode()">Cycle Mode</button>
    <button class="btn" onclick="window.skin?.setMode('sartan')">Sartan</button>
    <button class="btn" onclick="window.skin?.setMode('patryn')">Patryn</button>
    <button class="btn" onclick="window.skin?.setMode('ambient')">Ambient</button>
    <button class="btn primary" onclick="window.skin?.cycleMode()">🎮 Interact</button>
  </div>
  
  <div class="state-display">
    <span>Mode: <span id="mode-value" class="value">-</span></span>
    <span>Position: <span id="pos-value" class="value">-</span></span>
    <span>Gesture: <span id="gesture-value" class="value">-</span></span>
  </div>
  
  <div id="log" class="log"></div>
  
  <script type="module">
    import { createAmbientSkin } from './index.js';
    
    // Create skin instance
    const skin = createAmbientSkin();
    window.skin = skin;
    
    // Mount to container
    const container = document.getElementById('skin-container');
    skin.mount(container);
    
    // Action handler
    skin.onAction = (action, params) => {
      log('action', `${action}`, JSON.stringify(params));
      updateState();
    };
    
    // State change handler
    skin.getState = function() {
      return this.stateMatrix?.getState() || {};
    };
    
    // Log helper
    function log(type, action, params = '') {
      const logEl = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      logEl.innerHTML = `<div class="log-entry"><span class="time">[${time}]</span> <span class="action">${action}</span> <span class="params">${params}</span></div>` + logEl.innerHTML;
    }
    
    // Update state display
    function updateState() {
      const state = skin.getState();
      document.getElementById('mode-value').textContent = state.mode || '-';
      document.getElementById('pos-value').textContent = state.isActive ? `${state.x?.toFixed(2)}, ${state.y?.toFixed(2)}` : '-';
      document.getElementById('gesture-value').textContent = state.activeGesture || '-';
    }
    
    // Poll for state updates
    setInterval(updateState, 100);
    
    log('system', 'Ambient Skin initialized');
  </script>
</body>
</html>
